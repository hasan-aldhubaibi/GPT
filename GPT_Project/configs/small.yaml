# =========================================================
# MODEL
# =========================================================

vocab_size: 16000

block_size: 256

n_layer: 8
n_head: 8
d_model: 512

dropout: 0.1

# =========================================================
# TRAINING
# =========================================================

batch_size: 16
accumulation_steps: 8

learning_rate: 0.0003
min_lr: 0.00003

max_iters: 12000

eval_interval: 100
eval_iters: 20

# =========================================================
# OPTIMIZER
# =========================================================

weight_decay: 0.1

beta1: 0.9
beta2: 0.95

grad_clip: 1.0

# =========================================================
# SCHEDULER
# =========================================================

warmup_steps: 500

# =========================================================
# SYSTEM
# =========================================================

device: "cuda"

dtype: "float16"